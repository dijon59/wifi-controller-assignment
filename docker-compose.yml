
services:
  api:
    container_name: bconnetApi
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+psycopg://user:password@db:5432/bconnect
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: bconnectDb
    image: postgres:17
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=bconnect
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d bconnect"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
